<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArchiveMelon — Administrative Control Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Syne:wght@700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-core: #010103;
      --surface-glass: rgba(6, 6, 12, 0.45);
      --border-flux: rgba(255, 255, 255, 0.04);
      --border-flux-hover: rgba(168, 85, 247, 0.55);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      
      --neon-purple: #a855f7;
      --neon-purple-glow: rgba(168, 85, 247, 0.4);
      --neon-orange: #f97316;
      --neon-emerald: #10b981;
      --neon-blue: #3b82f6;
      
      --radius-card: 24px;
    }

    body {
      background: var(--bg-core);
      color: var(--text-primary);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      padding-bottom: 80px;
    }

    /* Background Aesthetics */
    .quantum-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .quantum-canvas::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: 
        radial-gradient(circle at 10% 10%, rgba(168, 85, 247, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 90% 90%, rgba(59, 130, 246, 0.1) 0%, transparent 40%);
      filter: blur(60px);
    }

    .viewport {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      margin-bottom: 50px;
      text-align: center;
    }
    .admin-logo {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }
    .admin-logo span { color: var(--neon-purple); }
    .admin-subtitle {
      color: var(--text-secondary);
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Grid Layout */
    .control-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }
    @media (min-width: 768px) {
      .control-grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* Cards */
    .panel-card {
      background: var(--surface-glass);
      border: 1px solid var(--border-flux);
      border-radius: var(--radius-card);
      padding: 32px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .panel-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Forms */
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    
    input, select, textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 14px 16px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      transition: all 0.3s ease;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--neon-purple);
      background: rgba(255, 255, 255, 0.05);
    }
    textarea { height: 100px; resize: none; }

    /* Action Elements */
    .btn-action {
      width: 100%;
      background: linear-gradient(135deg, var(--neon-purple) 0%, #7c3aed 100%);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
    }
    .btn-action:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px var(--neon-purple-glow);
    }
    .btn-reset {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      margin-top: 12px;
    }
    .btn-reset:hover {
      background: rgba(239, 68, 68, 0.1);
      border-color: #ef4444;
      color: #ef4444;
    }

    /* Quick Links Button */
    .nav-btn {
      display: inline-block;
      margin-bottom: 30px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: color 0.3s ease;
    }
    .nav-btn:hover { color: #fff; }
  </style>
</head>
<body>

  <div class="quantum-canvas"></div>

  <main class="viewport">
    <a href="index.html" class="nav-btn">← Back to Live Matrix</a>

    <header>
      <div class="admin-logo"><span>A</span>M Console</div>
      <div class="admin-subtitle">Oversight Command Node</div>
    </header>

    <div class="control-grid">
      
      <section class="panel-card">
        <h2 class="panel-title" style="color: var(--neon-orange);">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Rate Modification Matrix
        </h2>
        <form id="sales-form">
          <div class="form-group">
            <label>Target Asset Node</label>
            <select id="sale-target">
              <option>All Assets (Global Sale)</option>
              <option>Initialization Profile ($40 Tier)</option>
              <option>Administration Layer ($10/mo Tier)</option>
              <option>Logic Module ($5 Tier)</option>
              <option>Logic Core ($30 Tier)</option>
            </select>
          </div>
          <div class="form-group">
            <label>Discount Scale Value (%)</label>
            <input type="number" id="sale-amount" placeholder="e.g. 25" min="1" max="99" required />
          </div>
          <button type="submit" class="btn-action">Deploy Rate Scaling</button>
          <button type="button" id="reset-sales" class="btn-action btn-reset">Wipe Active Sales</button>
        </form>
      </section>

      <section class="panel-card">
        <h2 class="panel-title" style="color: var(--neon-purple);">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0M2 10h1M21 10h1M4.22 4.22l.7.7M19.08 4.22l-.7.7M12 2v1M12 18H3a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h18a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1h-3"/></svg>
          Broadcast Terminal
        </h2>
        <form id="announcement-form">
          <div class="form-group">
            <label>Transmission Header / Tag</label>
            <input type="text" id="announcement-title" placeholder="e.g. System Update" required />
          </div>
          <div class="form-group">
            <label>Luminescent Priority Spectrum</label>
            <select id="announcement-severity">
              <option>Promotional Glow (Purple Flash)</option>
              <option>Critical Override (Emerald Pulse)</option>
            </select>
          </div>
          <div class="form-group">
            <label>Transmission Log / Body Content</label>
            <textarea id="announcement-body" placeholder="Enter broadcast text array..." required></textarea>
          </div>
          <button type="submit" class="btn-action">Push System Broadcast</button>
          <button type="button" id="reset-announcement" class="btn-action btn-reset">Clear Broadcast Stream</button>
        </form>
      </section>

    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      
      // Handle Rate Adjustment Changes
      document.getElementById("sales-form").addEventListener("submit", (e) => {
        e.preventDefault();
        const target = document.getElementById("sale-target").value;
        const amount = document.getElementById("sale-amount").value;
        
        localStorage.setItem("nlm_active_sale", JSON.stringify({ target, amount }));
        alert("Global rate adjustments written to database parameters.");
      });

      document.getElementById("reset-sales").addEventListener("click", () => {
        localStorage.removeItem("nlm_active_sale");
        alert("Active price modulations purged completely.");
      });

      // Handle Broadcast System Changes
      document.getElementById("announcement-form").addEventListener("submit", (e) => {
        e.preventDefault();
        const title = document.getElementById("announcement-title").value;
        const severity = document.getElementById("announcement-severity").value;
        const body = document.getElementById("announcement-body").value;
        
        localStorage.setItem("nlm_active_announcement", JSON.stringify({ title, severity, body }));
        alert("System broadcast metrics injected into timeline pipeline.");
      });

      document.getElementById("reset-announcement").addEventListener("click", () => {
        localStorage.removeItem("nlm_active_announcement");
        alert("Broadcast stream disabled across client networks.");
      });

    });
  </script>
</body>
</html>
